name: CI

# Runs on every PR (and on pushes to the default branch). PRs are still
# merged manually by a human on GitHub — this only reports status checks.
on:
  pull_request:
  push:
    branches: [main, master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  brain-dump:
    name: Brain Dump (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/brain-dump
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/brain-dump/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint / next lint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Build + static export
        run: npm run build
