name: Deploy site to GitHub Pages

# Builds the whole site (static homepage + Brain Dump Next.js export) and
# publishes it as a Pages artifact. Requires Settings → Pages → Source set to
# "GitHub Actions" (one-time manual switch). Until that switch is made, the
# deploy step will not take effect.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Least-privilege token plus the scopes the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; never cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: brain-dump-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: brain-dump-app

      - name: Build Brain Dump (Next.js static export)
        run: npm run build
        working-directory: brain-dump-app

      - name: Assemble site artifact
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          # Static homepage (source) at the root.
          cp index.html _site/index.html
          cp -r assets _site/assets
          # Next.js export (basePath: /brain-dump) served under /brain-dump/.
          cp -r brain-dump-app/out _site/brain-dump
          # Safety net so the _next/ asset folder is served as-is.
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
